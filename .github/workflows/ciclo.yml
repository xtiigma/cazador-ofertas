name: cazador-ciclo-diario

# El ciclo del Cazador corre en la nube (no en la mini PC) para no calentarla.
# Al mediodía de Perú (misma hora que el timer local de antes) scrapea las 9
# tiendas, registra en Turso y avisa las gangas por Telegram.
on:
  schedule:
    - cron: '0 17 * * *'       # 17:00 UTC = 12:00 (mediodía) Perú (UTC-5)
  workflow_dispatch:            # disparo manual (con opciones para probar rápido)
    inputs:
      tiendas:
        description: 'Tiendas a correr (CSV de nombres, ej. "EFE,Dermo"). Vacío = las 9.'
        required: false
        default: ''
      pausa_min:
        description: 'Minutos de pausa entre tiendas (0 = sin pausa, para pruebas).'
        required: false
        default: '10'

# Nunca dos ciclos a la vez (un cron podría solaparse con un disparo manual).
concurrency:
  group: cazador-ciclo
  cancel-in-progress: false

# El ciclo publica el data.json como asset de un release (para que la mini PC lo
# baje): eso necesita permiso de escritura sobre el repo.
permissions:
  contents: write

jobs:
  ciclo:
    runs-on: ubuntu-latest
    timeout-minutes: 350        # < 6 h (límite de GitHub); el ciclo se autocorta a las 5 h
    env:
      # ── Secretos (Settings → Secrets del repo) ──────────────────────────────
      TURSO_TOKEN:        ${{ secrets.TURSO_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      # ── URLs de las 9 bases Turso (no secretas; nombre = directorio de la tienda) ──
      TURSO_URL_INKAFARMA:      libsql://cazador-inkafarma-xtiigma.aws-us-east-1.turso.io
      TURSO_URL_PLAZA_VEA:      libsql://cazador-plaza-vea-xtiigma.aws-us-east-1.turso.io
      TURSO_URL_SAGA_FALABELLA: libsql://cazador-saga-falabella-xtiigma.aws-us-east-1.turso.io
      TURSO_URL_DERMO:          libsql://cazador-dermo-xtiigma.aws-us-east-1.turso.io
      TURSO_URL_EFE:            libsql://cazador-efe-xtiigma.aws-us-east-1.turso.io
      TURSO_URL_SHOPSTAR:       libsql://cazador-shopstar-xtiigma.aws-us-east-1.turso.io
      TURSO_URL_SODIMAC:        libsql://cazador-sodimac-xtiigma.aws-us-east-1.turso.io
      TURSO_URL_TAILOY:         libsql://cazador-tailoy-xtiigma.aws-us-east-1.turso.io
      TURSO_URL_PROMART:        libsql://cazador-promart-xtiigma.aws-us-east-1.turso.io
      # ── Overrides del ciclo (inputs del disparo manual; en cron usan el default) ──
      CAZADOR_TIENDAS:   ${{ github.event.inputs.tiendas }}
      CAZADOR_PAUSA_MIN: ${{ github.event.inputs.pausa_min || '10' }}
    steps:
      - name: Traer el código
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # Persistir las réplicas locales de Turso entre corridas: así el sync diario
      # solo baja el DELTA en vez de ~400 MB de Plaza Vea cada día (el límite de
      # embedded syncs del free tier es 3 GB/mes).
      - name: Cache de las réplicas Turso
        uses: actions/cache@v4
        with:
          path: tiendas/*/datos/historial.db*
          key: turso-replicas-${{ github.run_id }}
          restore-keys: |
            turso-replicas-

      # config.py no está en el repo (gitignored); se genera desde la plantilla,
      # que lee BOT_TOKEN/CHAT_ID de las variables de entorno (los Secrets).
      - name: Config de Telegram desde los Secrets
        run: cp telegram_bot/config.example.py telegram_bot/config.py

      - name: Correr el ciclo
        run: python main.py

      # El dashboard vive en la mini PC y sirve web/public/data.json, pero el
      # ciclo ya no corre en casa: se publica aquí el data.json fresco como asset
      # de un release de tag fijo (`datos-nube`), que la mini PC baja por una URL
      # estable. Se sobrescribe (--clobber) en cada corrida.
      - name: Publicar data.json para el dashboard local
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -f web/public/data.json || { echo "::error::No se generó web/public/data.json"; exit 1; }
          gh release view datos-nube >/dev/null 2>&1 || \
            gh release create datos-nube \
              --title "Datos del dashboard (nube)" \
              --notes "data.json regenerado por el ciclo diario. Se sobrescribe en cada corrida; la mini PC lo baja para su dashboard local."
          gh release upload datos-nube web/public/data.json --clobber
          echo "data.json publicado: $(du -h web/public/data.json | cut -f1)"
